name: nafnet_flutter_app
description: "A Flutter demo app for NAFNet Image Denoising."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  camera: ^0.11.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  image: ^4.2.0
  tflite_flutter: ^0.12.0
  provider: ^6.1.2
  http: ^1.2.1
  path: ^1.9.0
  http_parser: ^4.0.0
  gal: ^2.3.2




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
